<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, Tannu 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;900&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#06061a;
  color:#f5efe0;
  font-family:'Lato';
  text-align:center;
}

/* COVER */
#cover{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{
  font-family:'Playfair Display';
  font-size:3rem;
}

/* BUTTON */
#nextBtn{
  margin-top:2rem;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff6b8a,#d4a853);
  color:white;
  cursor:pointer;
}

/* HEART BURST */
.burst-heart{
  position:fixed;
  font-size:1.5rem;
  animation:burst 1s ease forwards;
}
@keyframes burst{
  0%{transform:scale(0.5);opacity:1;}
  100%{transform:translateY(-150px) scale(1.5);opacity:0;}
}

/* SECTION */
section{
  padding:80px 20px;
}

/* COUNTDOWN */
#countdown{
  font-size:1.3rem;
  color:#f0c97a;
  margin-top:20px;
}

/* VIDEO */
.video-container{
  margin-top:30px;
  border:2px dashed #e8849a;
  padding:30px;
}
video{
  width:100%;
  max-width:500px;
  display:none;
}

/* LETTER */
#typingText{
  font-family:'Dancing Script';
  font-size:1.3rem;
  max-width:600px;
  margin:auto;
  line-height:2;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<!-- COVER -->
<div id="cover">
  <h1>Hey Tannu 💛</h1>
  <p>This is for you...</p>
  <button id="nextBtn">Start Our Story ❤️</button>
</div>

<!-- STORY -->
<section>
  <h2>Our Story 🌙</h2>
  <p>From balcony calls to forever...</p>
</section>

<!-- LETTER -->
<section>
  <h2>A Letter 💌</h2>
  <div id="typingText"></div>
</section>

<!-- VIDEO -->
<section>
  <h2>Our Video 🎬</h2>
  <div class="video-container">
    <input type="file" accept="video/*" onchange="loadVideo(this)">
    <video id="videoPlayer" controls></video>
  </div>
</section>

<!-- WEDDING -->
<section>
  <h2>Forever Begins 💍</h2>
  <p>20 April 2026</p>
  <div id="countdown"></div>
</section>

<script>
/* ✅ APP LOADED */
document.addEventListener("DOMContentLoaded",()=>{
  console.log("App Loaded ✅");
});

/* ❤️ HEART BURST + SCROLL */
document.getElementById('nextBtn').addEventListener('click',()=>{
  for(let i=0;i<20;i++){
    const h=document.createElement('div');
    h.className='burst-heart';
    h.textContent='❤️';
    h.style.left=Math.random()*100+'vw';
    h.style.top='70%';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }

  document.querySelector('section').scrollIntoView({behavior:'smooth'});
});

/* 🎵 MUSIC FIRST CLICK */
let started=false;
document.body.addEventListener('click',()=>{
  if(!started){
    document.getElementById('bgMusic').play().catch(()=>{});
    started=true;
  }
},{once:true});

/* ✨ TYPING EFFECT */
const text=`My Tannu,

Remember the friend request I kept sending and deleting?

That was me already falling for you.

You are my comfort zone.
And now… forever starts with you. 💛`;

let i=0;
function typeWriter(){
  if(i<text.length){
    document.getElementById("typingText").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,30);
  }
}

const observer=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting){
    typeWriter();
    observer.disconnect();
  }
});
observer.observe(document.getElementById("typingText"));

/* 💍 COUNTDOWN */
const weddingDate=new Date("April 20, 2026 00:00:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const gap=weddingDate-now;

  const d=Math.floor(gap/(1000*60*60*24));
  const h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((gap%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML=
    `${d} Days ${h} Hours ${m} Minutes left 💍`;
},1000);

/* 🎬 VIDEO PERSIST */
const VIDEO_KEY="tannu_video";

function loadVideo(input){
  const file=input.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=function(e){
    const data=e.target.result;
    try{localStorage.setItem(VIDEO_KEY,data);}catch(err){}
    renderVideo(data);
  };
  reader.readAsDataURL(file);
}

function renderVideo(src){
  const player=document.getElementById('videoPlayer');
  player.src=src;
  player.style.display='block';
}

const savedVideo=localStorage.getItem(VIDEO_KEY);
if(savedVideo){
  renderVideo(savedVideo);
}
</script>

</body>
</html>
